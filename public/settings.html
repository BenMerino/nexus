<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Settings — Nexus</title>
  <link rel="stylesheet" href="/shared.css">
</head>
<body>
  <script>if (!document.cookie.includes("nexus_logged_in=1")) window.location.href = "/login.html";</script>

  <nav>
    <span class="logo">Nexus</span>
    <a href="/overview.html">Overview</a>
    <a href="/explore.html">Explore</a>
    <a href="/submit.html">Submit</a>
    <div id="nav-user" style="margin-left: auto; min-height: 28px;"><a href="/api/auth?action=logout">Logout</a></div>
  </nav>

  <div class="page">
    <h1>Settings</h1>

    <div class="card">
      <h3>Tenant Logo</h3>
      <div class="mt-8" style="display: flex; align-items: center; gap: 16px;">
        <div id="logo-preview" style="width: 64px; height: 64px; border: 1px dashed #ccc; border-radius: 4px; display: flex; align-items: center; justify-content: center; overflow: hidden;">
          <span class="text-muted text-small">No logo</span>
        </div>
        <div>
          <input type="file" id="logo-input" accept="image/*" style="display: none;">
          <button onclick="document.getElementById('logo-input').click()">Upload Logo</button>
          <div id="upload-status" class="text-small mt-8"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Load current logo
    fetch("/api/auth?action=me").then(r => r.json()).then(d => {
      if (d.logo) showPreview(d.logo);
    });

    function showPreview(src) {
      document.getElementById("logo-preview").innerHTML =
        `<img src="${src}" style="max-width: 64px; max-height: 64px; object-fit: contain;">`;
    }

    document.getElementById("logo-input").addEventListener("change", async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const status = document.getElementById("upload-status");
      if (file.size > 512000) { status.textContent = "File too large (max 500KB)"; return; }

      status.textContent = "Uploading...";
      const reader = new FileReader();
      reader.onload = async () => {
        try {
          const resp = await fetch("/api/auth?action=upload-logo", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ data: reader.result }),
          });
          const result = await resp.json();
          if (result.ok) {
            status.textContent = "Logo updated!";
            showPreview(reader.result);
          } else {
            status.textContent = "Error: " + result.error;
          }
        } catch (err) {
          status.textContent = "Error: " + err.message;
        }
      };
      reader.readAsDataURL(file);
    });
  </script>
  <script src="/nav.js"></script>
</body>
</html>
