<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Explore — Nexus</title>
  <link rel="stylesheet" href="/shared.css">
  <link rel="preload" href="/api/auth?action=me" as="fetch" crossorigin="use-credentials">
  <link rel="modulepreload" href="/shell-mount-bundle.js">
  <style>
    .section-tabs {
      display: flex; gap: 0; margin-bottom: 18px;
      border-bottom: 1px solid var(--border-soft);
    }
    .section-tabs button {
      background: transparent; border: 0; border-bottom: 2px solid transparent;
      padding: 10px 16px; cursor: pointer; font-family: var(--mono); font-size: 12px;
      color: var(--fg-dim); letter-spacing: 0.08em; text-transform: uppercase;
    }
    .section-tabs button:hover { color: var(--fg); }
    .section-tabs button.active { color: var(--accent); border-bottom-color: var(--accent); }
    .section { display: none; }
    .section.active { display: block; }
    .tag-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag-cloud .tag { cursor: pointer; transition: transform 0.1s; }
    .tag-cloud .tag:hover { transform: scale(1.05); }
    .search-result { border-left: 2px solid var(--accent); padding: 10px 14px; margin-bottom: 10px; background: var(--bg-card); border-radius: 3px; }
    .search-result h4 { margin-bottom: 4px; font-family: var(--display); font-weight: 400; font-size: 18px; }
    .search-result .meta { font-size: 12px; color: var(--fg-dim); }
    .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; padding: 12px 0; align-items: center; }
    .filter-bar label { font-family: var(--mono); font-size: 10px; color: var(--fg-dim); letter-spacing: 0.14em; text-transform: uppercase; }
    .tag-filter.active { background: var(--accent); color: #1a1612; border-color: var(--accent); }
  </style>
</head>
<body class="shell-fixed">
  <script>if (!document.cookie.includes("nexus_logged_in=1")) window.location.href = "/login.html";</script>
  <div class="app">
    <div id="sidebar-mount" data-path="/explore.html"></div>
    <main class="main">
      <div class="view">
        <header class="view-head compact">
          <div>
            <div class="eyebrow">Explore</div>
            <h1 class="view-title tight">Every record, <em>searchable</em>.</h1>
          </div>
        </header>

        <div class="section-tabs">
          <button class="active" onclick="showSection('records')">Records</button>
          <button onclick="showSection('search')">Search</button>
          <button onclick="showSection('tags')">Tag cloud</button>
        </div>

        <div id="records" class="section active">
          <div class="flex mb-16" style="justify-content: space-between; align-items: center;">
            <div class="search-box" style="flex: 1; max-width: 400px;">
              <input id="rec-search" type="text" placeholder="Filter by title, author, journal, DOI…" style="width: 100%;">
            </div>
            <div class="flex gap-8">
              <label id="mine-toggle" style="display: none; align-items: center; gap: 6px; font-family: var(--mono); font-size: 11px; color: var(--fg-dim); cursor: pointer;">
                <input id="mine-check" type="checkbox"> Only mine
              </label>
              <label style="font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-dim);">Sort</label>
              <select id="sort-select">
                <option value="newest">Newest first</option>
                <option value="oldest">Oldest first</option>
                <option value="citations">Most cited</option>
                <option value="title">Title A-Z</option>
              </select>
            </div>
          </div>
          <div id="record-count" class="text-muted text-small mb-16"></div>
          <div style="overflow-x: auto;">
            <table class="data-table" id="records-table">
              <thead>
                <tr>
                  <th>Title</th><th>Authors</th><th>Journal</th>
                  <th>Published</th><th>Citations</th><th>Type</th><th>OA</th>
                </tr>
              </thead>
              <tbody id="records-body"></tbody>
            </table>
          </div>
          <div id="empty-state" style="display: none; text-align: center; padding: 40px;">
            <p class="text-muted">No records found.</p>
            <p class="text-small text-muted mt-8">Submit DOIs from <a href="/submit.html">the submit page</a>.</p>
          </div>
        </div>

        <div id="search" class="section">
          <div class="card">
            <label class="form-label">Search records</label>
            <div class="flex gap-8">
              <input id="search-input" type="text" placeholder="Search by title, author, journal, DOI, publisher…" style="flex: 1;">
              <button class="primary-btn" onclick="doSearch()">Search</button>
            </div>
          </div>
          <div id="search-status" class="mt-8"></div>
          <div id="search-results" class="mt-16"></div>
        </div>

        <div id="tags" class="section">
          <div class="filter-bar">
            <label>Filter</label>
            <button class="secondary tag-filter active" data-cat="all" onclick="filterTags('all', this)">All</button>
            <button class="secondary tag-filter" data-cat="author" onclick="filterTags('author', this)">Authors</button>
            <button class="secondary tag-filter" data-cat="journal" onclick="filterTags('journal', this)">Journals</button>
            <button class="secondary tag-filter" data-cat="publisher" onclick="filterTags('publisher', this)">Publishers</button>
            <button class="secondary tag-filter" data-cat="type" onclick="filterTags('type', this)">Types</button>
            <button class="secondary tag-filter" data-cat="institution" onclick="filterTags('institution', this)">Institutions</button>
            <button class="secondary tag-filter" data-cat="venue" onclick="filterTags('venue', this)">Venues</button>
            <button class="secondary tag-filter" data-cat="year" onclick="filterTags('year', this)">Years</button>
          </div>
          <div id="tag-cloud" class="tag-cloud mt-16"></div>
          <div id="tag-detail" class="mt-16" style="display: none;">
            <div class="card">
              <h3 id="tag-detail-title"></h3>
              <div id="tag-detail-records" class="mt-8"></div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    function showSection(id) {
      document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
      document.querySelectorAll(".section-tabs button").forEach(b => b.classList.remove("active"));
      document.getElementById(id).classList.add("active");
      document.querySelector(`.section-tabs button[onclick="showSection('${id}')"]`).classList.add("active");
      if (id === "tags") loadTags();
    }
    function escHtml(s) { if (!s) return ""; return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;"); }
    function escAttr(s) { return escHtml(s).replace(/'/g, "&#39;"); }
  </script>
  <script type="module" src="/shell-mount-bundle.js"></script>
  <script src="/explore-records.js"></script>
  <script src="/explore-search.js"></script>
  <script src="/explore-tags.js"></script>
</body>
</html>
