<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Author Import — Nexus</title>
  <link rel="stylesheet" href="/shared.css">
</head>
<body>
  <script>if (!document.cookie.includes("nexus_logged_in=1")) window.location.href = "/login.html";</script>

  <nav>
    <span class="logo">Nexus</span>
    <a href="/overview.html">Overview</a>
    <a href="/explore.html">Explore</a>
    <a href="/submit.html">Submit</a>
    <a href="/author-import.html" class="active">Author Import</a>
    <div id="nav-user" style="margin-left: auto; min-height: 28px;"><a href="/api/auth?action=logout">Logout</a></div>
  </nav>

  <div class="page">
    <h1>Author Import</h1>

    <div class="card">
      <div style="max-width: 500px;">
        <label style="display: block; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; font-weight: bold;">Author Name</label>
        <div class="flex gap-8">
          <input id="author-search" type="text" placeholder="e.g. Albert Einstein" style="flex: 1;">
          <button onclick="searchAuthor()">Search</button>
        </div>
      </div>
    </div>

    <div id="suggestions" class="mt-8"></div>
    <div id="status" class="mt-8"></div>
    <div id="results" class="mt-16"></div>
  </div>

  <script src="/author-import.js"></script>
  <script src="/nav.js"></script>
</body>
</html>
