<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Tag Manager — Nexus</title>
  <link rel="stylesheet" href="/shared.css">
  <style>
    .candidate-card { background: #fff; border: 1px solid #ddd; border-radius: 4px; padding: 16px; margin-bottom: 12px; }
    .candidate-values { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin: 8px 0; }
    .candidate-values .tag { cursor: pointer; border: 2px solid transparent; }
    .candidate-values .tag.selected { border-color: #333; font-weight: bold; }
    .candidate-actions { display: flex; gap: 8px; margin-top: 8px; }
    .score-badge { font-size: 11px; background: #e3f2fd; color: #1565c0; padding: 2px 6px; border-radius: 3px; }
    .synonym-row { display: flex; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px solid #eee; }
    .synonym-row .arrow { color: #999; }
    .openalex-hint { font-size: 11px; color: #2e7d32; margin-top: 4px; }
    .tab-bar { display: flex; gap: 0; margin-bottom: 16px; }
    .tab-bar button { border-radius: 0; border-right: none; }
    .tab-bar button:first-child { border-radius: 3px 0 0 3px; }
    .tab-bar button:last-child { border-radius: 0 3px 3px 0; border-right: 1px solid #333; }
    .tab-bar button.active { background: #333; color: #fff; }
    .tab-bar button:not(.active) { background: #fff; color: #333; }
  </style>
</head>
<body>
  <script>if (!document.cookie.includes("nexus_logged_in=1")) window.location.href = "/login.html";</script>

  <nav>
    <span class="logo">Nexus</span>
    <span id="nav-links"></span>
    <div id="nav-user" style="margin-left: auto; min-height: 28px;"><a href="/api/auth?action=logout">Logout</a></div>
  </nav>

  <div class="page">
    <h1>Tag Manager</h1>
    <p class="text-muted text-small mb-16">Detect and merge duplicate tags across all categories. The system suggests matches; you confirm the canonical name.</p>

    <div class="tab-bar">
      <button class="active" onclick="switchTab('candidates', this)">Candidates</button>
      <button onclick="switchTab('active', this)">Active Synonyms</button>
    </div>

    <div id="filter-bar" class="filter-bar">
      <label>Category:</label>
      <select id="category-filter" onchange="loadCandidates()">
        <option value="">All</option>
        <option value="author">Author</option>
        <option value="institution">Institution</option>
        <option value="journal">Journal</option>
        <option value="publisher">Publisher</option>
        <option value="venue">Venue</option>
      </select>
      <button onclick="loadCandidates()">Scan</button>
      <span id="scan-status" class="text-small text-muted"></span>
    </div>

    <div id="candidates-tab"></div>
    <div id="active-tab" style="display: none;"></div>
  </div>

  <script src="/tag-manager.js"></script>
  <script src="/nav.js"></script>
</body>
</html>
