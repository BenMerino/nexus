<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Tag Manager — Nexus</title>
  <link rel="stylesheet" href="/shared.css?v=1777162738130">
</head>
<body class="shell-fixed">
  <script>if (!document.cookie.includes("nexus_logged_in=1")) window.location.href = "/login.html";</script>
  <div class="app">
    <div id="sidebar-mount" data-path="/tag-manager.html"></div>
    <main class="main">
      <style>
        .candidate-card { background: var(--bg-card); border: 1px solid var(--border-soft); border-radius: var(--radius); padding: 18px 22px; margin-bottom: 14px; }
        .candidate-values { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin: 10px 0; }
        .candidate-values .tag { cursor: pointer; border: 2px solid transparent; }
        .candidate-values .tag.selected { border-color: var(--accent); font-weight: 500; }
        .candidate-actions { display: flex; gap: 8px; margin-top: 10px; }
        .score-badge { font-size: 11px; background: var(--bg-inset); color: var(--accent); padding: 2px 8px; border-radius: 3px; font-family: var(--mono); }
        .synonym-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border-soft); }
        .synonym-row .arrow { color: var(--fg-dim); }
        .openalex-hint { font-size: 11px; color: var(--ok); margin-top: 4px; font-family: var(--mono); }
        .tab-bar { display: flex; gap: 0; margin-bottom: 18px; border-bottom: 1px solid var(--border-soft); }
        .tab-bar button { background: transparent; border: 0; border-bottom: 2px solid transparent; padding: 10px 18px; cursor: pointer; font-family: var(--mono); font-size: 12px; color: var(--fg-dim); letter-spacing: 0.08em; text-transform: uppercase; }
        .tab-bar button:hover { color: var(--fg); }
        .tab-bar button.active { color: var(--accent); border-bottom-color: var(--accent); }
      </style>
      <div class="view">
        <header class="view-head">
          <div>
            <div class="eyebrow">Admin · canonicalization</div>
            <h1 class="view-title">Tag <em>merger</em>.</h1>
            <div class="view-sub">Detect duplicate tags across all categories. The system suggests matches; you confirm the canonical name.</div>
          </div>
        </header>

        <div class="tab-bar">
          <button class="active" onclick="switchTab('candidates', this)">Candidates</button>
          <button onclick="switchTab('active', this)">Active synonyms</button>
        </div>

        <div id="filter-bar" class="filter-bar">
          <label>Category</label>
          <select id="category-filter" onchange="loadCandidates()">
            <option value="">All</option>
            <option value="author">Author</option>
            <option value="institution">Institution</option>
            <option value="journal">Journal</option>
            <option value="publisher">Publisher</option>
            <option value="venue">Venue</option>
          </select>
          <button class="primary-btn" onclick="loadCandidates()">Scan</button>
          <span id="scan-status" class="text-small text-muted"></span>
        </div>

        <div id="candidates-tab"></div>
        <div id="active-tab" style="display: none;"></div>
      </div>
      <script src="/tag-manager.js?v=1777162738130"></script>
    </main>
  </div>
  <script type="module" src="/shell-mount-bundle.js?v=1777162738130"></script>
  <script src="/spa-router.js?v=1777162738130"></script>
</body>
</html>
