<!DOCTYPE html>
<html>
<head><!--CLAUSTRO-VERSION-GUARD--><script>(function(){var V="1777165843657";try{fetch("/build-version.txt?_="+Date.now(),{cache:"no-store"}).then(function(r){return r.text()}).then(function(t){t=t.trim();if(t&&t!==V&&sessionStorage.getItem("nx-reload")!==t){sessionStorage.setItem("nx-reload",t);location.replace(location.pathname+"?fresh="+t)}})}catch(e){}})();</script><!--CLAUSTRO-VERSION-GUARD-->
  <meta charset="utf-8">
  <title>Dashboard — Nexus</title>
  <link rel="stylesheet" href="/shared.css?v=1777165843657">
  <link rel="stylesheet" href="/projects-gantt.css?v=1777165843657">
</head>
<body>
  <script>if (!document.cookie.includes("nexus_logged_in=1")) window.location.href = "/login.html";</script>
  <div class="app app-scroll">
    <div id="sidebar-mount" data-path="/dashboard.html"></div>
    <main class="main">
      <style>
        .import-card {
          margin-top: 24px; padding: 20px 22px;
          background: var(--bg-card); border: 1px solid var(--border-soft); border-radius: var(--radius);
        }
        .import-card h3 { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--fg-dim); margin: 0 0 6px; font-weight: 500; }
        .import-card p { font-size: 13px; color: var(--fg-muted); margin: 0 0 12px; }
        .import-btn {
          background: var(--accent); color: #1a1612; border: 0;
          padding: 10px 18px; border-radius: 4px; font-weight: 500; cursor: pointer; font: inherit;
        }
        .import-btn:hover { filter: brightness(1.08); }
        .import-btn:disabled { opacity: 0.5; cursor: default; }
        .import-progress { margin-top: 10px; font-size: 12px; color: var(--fg-dim); font-family: var(--mono); }
        .progress-bar { height: 4px; background: var(--border-soft); border-radius: 2px; margin-top: 8px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }
      </style>
      <div id="dashboard-root"></div>
      <template id="import-template">
        <div class="import-card" id="import-section" style="display:none;">
          <h3>Bulk import · OpenAlex</h3>
          <p>Import all publications affiliated with your institution.</p>
          <button class="import-btn" id="import-btn" onclick="startImport()">Import publications</button>
          <div class="import-progress" id="import-status"></div>
          <div class="progress-bar" id="progress-bar" style="display:none;"><div class="progress-fill" id="progress-fill"></div></div>
        </div>
      </template>
      <script src="/dashboard-import.js?v=1777165843657"></script>
      <script type="module" src="/dashboard-bundle.js?v=1777165843657"></script>
    </main>
  </div>
  <script type="module" src="/shell-mount-bundle.js?v=1777165843657"></script>
  <script src="/spa-router.js?v=1777165843657"></script>
</body>
</html>
