<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Research — Nexus</title>
  <link rel="stylesheet" href="/shared.css?v=1777164532096">
  <style>
    body { --primary: #333333; --secondary: #1565c0; }
    .authors-toolbar { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
    .authors-toolbar input { flex: 1; }
    .authors-table { width: 100%; border-collapse: collapse; font-size: 13px; background: var(--bg-card); border: 1px solid var(--border-soft); border-radius: 4px; }
    .authors-table th, .authors-table td { padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border-soft); }
    .authors-table th { cursor: pointer; background: var(--bg-inset); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--fg-dim); user-select: none; font-family: var(--mono); }
    .authors-table th:hover { color: var(--fg); }
    .authors-table tr:last-child td { border-bottom: none; }
    .authors-table td.num { text-align: right; font-variant-numeric: tabular-nums; font-family: var(--mono); }
  </style>
</head>
<body class="shell-fixed">
  <div id="tenant-root">
    <div style="padding: 24px; color: var(--fg-dim);">Loading…</div>
  </div>
  <script type="module" src="/tenant-bundle.js?v=1777164532096"></script>
</body>
</html>
