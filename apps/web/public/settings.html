<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Settings — Nexus</title>
  <link rel="stylesheet" href="/shared.css">
</head>
<body class="shell-fixed">
  <script>if (!document.cookie.includes("nexus_logged_in=1")) window.location.href = "/login.html";</script>
  <div class="app">
    <div id="sidebar-mount" data-path="/settings.html"></div>
    <main class="main">
      <style>
        .branding-grid { display: grid; grid-template-columns: auto 1fr; gap: 24px; align-items: start; }
        .logo-box { width: 96px; height: 96px; border: 1px dashed var(--border); border-radius: var(--radius); display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: pointer; background: var(--bg-inset); }
        .logo-box:hover { border-color: var(--accent); }
        .logo-box img { max-width: 96px; max-height: 96px; object-fit: contain; }
        .color-row { display: flex; align-items: center; gap: 10px; margin: 10px 0; }
        .color-row label { width: 140px; font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-dim); }
        .color-row input[type="color"] { width: 40px; height: 32px; border: 1px solid var(--border); border-radius: 3px; cursor: pointer; padding: 0; background: transparent; }
        .color-row .hex { font-size: 11px; color: var(--fg-dim); font-family: var(--mono); }
      </style>
      <div class="view">
        <header class="view-head">
          <div>
            <div class="eyebrow">Tenant</div>
            <h1 class="view-title">Branding &amp; <em>identity</em>.</h1>
            <div class="view-sub">Logo, primary, and secondary colors propagate across every authenticated page for your institution.</div>
          </div>
        </header>

        <div class="card" id="branding-card" style="display:none;">
          <h3 id="branding-title" style="font-family: var(--display); font-weight: 400; font-size: 22px; margin-bottom: 18px;">University branding</h3>
          <div class="branding-grid">
            <div>
              <div class="logo-box" id="logo-preview" onclick="document.getElementById('logo-input').click()" title="Click to upload logo">
                <span class="text-muted text-small">No logo</span>
              </div>
              <input type="file" id="logo-input" accept="image/*" style="display: none;">
              <div id="upload-status" class="text-small mt-8" style="width:96px;text-align:center;"></div>
            </div>
            <div>
              <div class="color-row">
                <label>Primary</label>
                <input type="color" id="primary-color" value="#e6a756">
                <span class="hex" id="primary-hex">#e6a756</span>
              </div>
              <div class="color-row">
                <label>Secondary</label>
                <input type="color" id="secondary-color" value="#6ba4d6">
                <span class="hex" id="secondary-hex">#6ba4d6</span>
              </div>
              <div id="color-suggestions" style="margin-top:12px;"></div>
              <button class="primary-btn" onclick="saveColors()" style="margin-top:12px;">Save colors</button>
              <span id="color-status" class="text-small" style="margin-left:10px;"></span>
            </div>
          </div>
        </div>
      </div>
      <script type="module" src="/color-extract.js"></script>
      <script type="module" src="/settings-app.js"></script>
    </main>
  </div>
  <script type="module" src="/shell-mount.tsx"></script>
  <script type="module" src="/spa-router.js"></script>
</body>
</html>
