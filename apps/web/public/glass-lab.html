<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Glass Lab</title>
  <link rel="stylesheet" href="/shared.css">
  <style>
    /* Glass Lab — an UNBIASED reproduction page for the liquid-glass pipeline:
       one default glass element over a deterministic grid, no sky gradient, no
       theme surfaces, no app layout. The platform pipeline still self-mounts
       (THEME_BOOT sets data-lg/liquid; the injected sky-bg module boots
       lg-glass + the kube engine), so what renders here is EXACTLY the
       production glass — only the backdrop is controlled.
       Page-specific styles only (N9): the grid + centering. */

    /* Deterministic backdrop: sits ABOVE the global sky canvas (z:0) and the
       film grain (z:1) so neither biases the pixels behind the glass. Crisp
       24px checker + hairline grid — bends, shifts, and smears are obvious. */
    .lab-grid {
      position: fixed; inset: 0; z-index: 2;
      background:
        linear-gradient(to right, rgba(255,255,255,0.25) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.25) 1px, transparent 1px),
        repeating-conic-gradient(#3a3f4a 0% 25%, #b8bece 0% 50%);
      background-size: 24px 24px, 24px 24px, 48px 48px;
    }

    .lab-stage {
      position: fixed; inset: 0; z-index: 3;
      display: grid; place-items: center;
    }
    /* The subject: a stock platform glass surface (.card — same class, same
       cascade as production) at a fixed, card-scale size so the kube engine
       assigns it a filter. Nothing else styles it here. */
    .lab-stage .card { width: 480px; height: 320px; }
    .lab-note {
      position: fixed; left: 16px; bottom: 12px; z-index: 3;
      font-family: var(--font-mono); font-size: var(--text-micro); color: #555;
    }
  </style>
</head>
<body>
  <div class="lab-grid"></div>
  <div class="lab-stage">
    <section class="card">
      <h4>Glass specimen</h4>
      <p class="muted">Default platform glass over a neutral grid. Toggle modes with
        <code>__lgGlass('liquid'|'glass'|'off')</code>; inspect with
        <code>__kubeDebug</code> (list / outline / mode / showMap / snap).</p>
    </section>
  </div>
  <div class="lab-note">glass-lab — unbiased liquid-glass reproduction page</div>
</body>
</html>
