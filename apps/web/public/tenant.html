<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Research — Nexus</title>
  <link rel="stylesheet" href="/shared.css">
  <style>
    body { --primary: #333333; --secondary: #1565c0; }
    .authors-toolbar { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
    .authors-toolbar input { flex: 1; }
    .authors-table { width: 100%; border-collapse: collapse; font-size: 13px; background: var(--bg-card); border: 1px solid var(--border-soft); border-radius: 4px; }
    .authors-table th, .authors-table td { padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border-soft); }
    .authors-table th { cursor: pointer; background: var(--bg-inset); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--fg-dim); user-select: none; font-family: var(--mono); }
    .authors-table th:hover { color: var(--fg); }
    .authors-table tr:last-child td { border-bottom: none; }
    .authors-table td.num { text-align: right; font-variant-numeric: tabular-nums; font-family: var(--mono); }
    .org-tree { font-size: 13px; }
    .org-node { border-bottom: 1px solid var(--border-soft); }
    .org-row { display: flex; align-items: center; gap: 10px; padding: 9px 4px; cursor: pointer; }
    .org-row:hover { background: var(--bg-inset); }
    .org-row.leaf { cursor: default; }
    .org-twist { width: 12px; color: var(--fg-dim); font-size: 10px; flex: none; transition: transform 0.12s; }
    .org-twist.open { transform: rotate(90deg); }
    .org-name { flex: 1; }
    .org-name.fac { font-family: var(--display); font-size: 15px; }
    .org-kind { font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg-dim); border: 1px solid var(--border); border-radius: 3px; padding: 1px 5px; margin-left: 8px; vertical-align: middle; }
    .org-name.dep { color: var(--fg); }
    .org-name.person { color: var(--fg-dim); font-size: 12px; }
    .org-metrics { display: flex; gap: 6px; align-items: center; flex: none; }
    .org-pill { font-family: var(--mono); font-size: 10px; letter-spacing: 0.04em; padding: 2px 7px; border-radius: 10px; background: var(--bg-inset); border: 1px solid var(--border); color: var(--fg-dim); white-space: nowrap; }
    .org-pill.cov-full { border-color: var(--accent); color: var(--accent); }
    .org-children { display: none; padding-left: 22px; }
    .org-children.open { display: block; }
    .org-orcid { font-family: var(--mono); font-size: 10px; color: var(--fg-dim); }
    .org-orcid.none { opacity: 0.45; }
    .org-err { color: var(--danger, #d66); font-size: 11px; font-family: var(--mono); }
  </style>
</head>
<body class="shell-fixed">
  <div id="tenant-root">
    <div style="padding: 24px; color: var(--fg-dim);">Loading…</div>
  </div>
  <script type="module" src="/tenant.tsx"></script>
</body>
</html>
