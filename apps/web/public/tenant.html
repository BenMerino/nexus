<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Research — Nexus</title>
  <link rel="stylesheet" href="/shared.css">
  <style>
    body { --primary: #333333; --secondary: #1565c0; }
    /* Public tenant shell: top header bar + scrollable main, no sidebar.
       Height pinned to viewport so .public-main is a real scroll container —
       body.shell-fixed clips overflow at the body level, so an inner scroller
       is the only way tall content (charts, long author tables) can scroll. */
    .public-app { display: flex; flex-direction: column; height: 100vh; }
    .public-header {
      display: flex; align-items: center; gap: 24px;
      padding: 10px 24px;
      background: var(--bg-inset);
      border-bottom: 1px solid var(--border-soft);
      flex-wrap: wrap;
    }
    .public-brand { display: flex; align-items: center; gap: 12px; flex: none; }
    .public-logo { height: 36px; width: auto; max-width: 120px; object-fit: contain; }
    .public-logo-fallback { display: inline-block; height: 36px; width: 36px; border-radius: 6px; background: var(--bg-card); border: 1px solid var(--border); }
    .public-tenant-name { font-family: var(--display); font-size: 17px; line-height: 1.1; }
    .public-tenant-sub { font-family: var(--mono); font-size: 10px; letter-spacing: 0.06em; color: var(--fg-dim); margin-top: 2px; }
    .public-tenant-sub a { color: var(--fg-dim); }
    .public-tenant-sub a:hover { color: var(--accent); }
    .public-tabs {
      display: flex; gap: 2px; flex: 1;
      align-self: flex-end;
      margin-left: 12px;
      overflow-x: auto; white-space: nowrap;
      scrollbar-width: thin;
    }
    .public-tab {
      padding: 9px 14px;
      font-size: 13px;
      color: var(--fg-dim);
      border-bottom: 2px solid transparent;
      cursor: pointer;
      text-decoration: none;
      transition: color 0.12s, border-color 0.12s;
    }
    .public-tab:hover { color: var(--fg); }
    .public-tab.active { color: var(--fg); border-bottom-color: var(--accent); }
    .public-header-aux {
      display: flex; align-items: center; gap: 10px;
      font-family: var(--mono); font-size: 11px; color: var(--fg-dim);
      flex: none;
    }
    .public-signin { color: var(--fg-dim); }
    .public-signin:hover { color: var(--accent); }
    .public-main { flex: 1; padding: 24px; overflow-y: auto; min-height: 0; }
    .public-main .view { max-width: 1200px; margin: 0 auto; }
    /* Two-column shell: org scheme pinned left, Overview/Authors content right.
       The rail is a sticky, independently-scrolling sidebar; the content takes
       the remaining width. */
    /* Left-anchored (no centering gutter) so the rail hugs the page edge; the
       page's own 24px padding is the only space before the schema. */
    .tenant-layout { display: flex; gap: 24px; align-items: flex-start; }
    .tenant-rail {
      flex: 0 0 300px; width: 300px; position: sticky; top: 0;
      max-height: calc(100vh - 120px); overflow-y: auto;
      border-right: 1px solid var(--border-soft); padding-right: 18px;
    }
    .tenant-rail-title {
      font-family: var(--display); font-weight: 400; font-size: 13px;
      text-transform: uppercase; letter-spacing: 0.1em; color: var(--fg-dim);
      margin: 0 0 12px;
    }
    .tenant-content { flex: 1 1 auto; min-width: 0; padding: 0; max-width: none; margin: 0; }
    @media (max-width: 980px) {
      /* Stack on narrow screens: org scheme above the content, full width. */
      .tenant-layout { flex-direction: column; gap: 20px; }
      .tenant-rail { flex-basis: auto; width: 100%; position: static; max-height: none;
        border-right: none; border-bottom: 1px solid var(--border-soft); padding-right: 0; padding-bottom: 18px; }
    }
    @media (max-width: 700px) {
      .public-header { padding: 8px 14px; gap: 12px; }
      .public-tabs { width: 100%; margin-left: 0; }
      .public-header-aux { display: none; }
    }
    /* Roster-style table: bordered, full-width, sticky header, hover rows. */
    .admin-table { width: 100%; border-collapse: collapse; font-size: 12px; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .admin-table th, .admin-table td { padding: 9px 12px; text-align: left; border-bottom: 1px solid var(--border-soft); }
    .admin-table th { position: sticky; top: 0; z-index: 1; background: var(--bg-inset); font-weight: 500; text-transform: uppercase; font-size: 10px; letter-spacing: 0.12em; color: var(--fg-dim); font-family: var(--mono); user-select: none; }
    .admin-table tbody tr:last-child td { border-bottom: none; }
    .admin-table tbody tr:hover { background: var(--bg-inset); }
    .roster-toolbar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .tableScroll { max-height: 56vh; overflow: auto; }
    /* Org tree — file-explorer style with CSS-drawn connector lines.
       Each subtree carries a vertical guide on the left; each direct
       child grows a horizontal hook into its row's vertical center. */
    .org-tree { font-size: 13px; --tree-guide: var(--border); }
    .org-node { position: relative; }
    .org-node > .org-row { display: flex; align-items: center; gap: 10px; padding: 9px 4px; cursor: pointer; position: relative; }
    .org-node > .org-row:hover { background: var(--bg-inset); }
    .org-node > .org-row.leaf { cursor: default; }
    /* Selectable scope rows: clicking re-scopes the Overview. Active row gets a
       left accent + tint so the current scope is unmistakable. */
    .org-row.selectable { border-radius: 6px; }
    .org-row.active { background: var(--bg-inset); box-shadow: inset 2px 0 0 var(--primary); }
    .org-row.active .org-name { color: var(--primary); }
    .org-twist { width: 12px; color: var(--fg-dim); font-size: 10px; flex: none; transition: transform 0.12s; text-align: center; }
    .org-twist.open { transform: rotate(90deg); }
    .org-name { flex: 1; }
    .org-name.fac { font-family: var(--display); font-size: 15px; }
    /* Kind tag in its own fixed-width slot so every tag aligns into one column,
       regardless of the unit name's length (department rows leave it empty). */
    .org-kind-slot { flex: none; width: 76px; display: flex; justify-content: flex-start; }
    .org-kind { font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg-dim); border: 1px solid var(--border); border-radius: 3px; padding: 1px 5px; white-space: nowrap; }
    .org-name.dep { color: var(--fg); }
    .org-name.person { color: var(--fg-dim); font-size: 12px; }
    .org-metrics { display: flex; gap: 6px; align-items: center; flex: none; }
    .org-pill { font-family: var(--mono); font-size: 10px; letter-spacing: 0.04em; padding: 2px 7px; border-radius: 10px; background: var(--bg-inset); border: 1px solid var(--border); color: var(--fg-dim); white-space: nowrap; }
    .org-pill.cov-full { border-color: var(--accent); color: var(--accent); }

    /* Ranked metric bar on each unit row — the scheme as a contributors chart.
       Fixed-width on the right so bars align into a column down the rail. */
    .org-bar { display: flex; align-items: center; gap: 8px; flex: none; width: 132px; }
    .org-bar-track { flex: 1; height: 7px; background: var(--bg-inset); border-radius: 4px; overflow: hidden; }
    .org-bar-fill { display: block; height: 100%; background: var(--chart-1); border-radius: 4px; }
    .org-bar-val { font-family: var(--mono); font-size: 11px; color: var(--fg-dim); min-width: 40px; text-align: right; white-space: nowrap; }
    /* Departments' bars a touch dimmer so faculty bars read as the primary tier. */
    .org-children .org-bar-fill { background: var(--chart-2); }

    /* Biggest-contributors ranking rows (right-side chart). Name takes the slack
       so every bar aligns into a column; drillable rows highlight on hover. */
    .contrib-row { display: flex; align-items: center; gap: 12px; padding: 5px 6px; border-radius: 6px; }
    .contrib-row.drillable { cursor: pointer; }
    .contrib-row.drillable:hover { background: var(--bg-inset); }
    .contrib-name { flex: 1; min-width: 0; font-size: 13px; color: var(--fg); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .contrib-row .org-bar { width: 180px; }

    /* Top-level faculties: light card stripe so they read as roots. */
    .org-tree > .org-node { border-top: 1px solid var(--border-soft); }
    .org-tree > .org-node:first-child { border-top: none; }
    .org-tree > .org-node > .org-row { padding: 12px 4px; }

    /* Sub-tree container with vertical guide on the left. */
    .org-children { display: none; position: relative; margin-left: 11px; padding-left: 18px; }
    .org-children.open { display: block; }
    .org-children::before {
      content: ""; position: absolute; left: 0; top: 0;
      bottom: 18px; /* stop near the last child's row centre so the guide ends at └─ */
      border-left: 1px solid var(--tree-guide);
    }
    /* Horizontal hook from the vertical guide into each direct child row. */
    .org-children > .org-node > .org-row::before {
      content: ""; position: absolute; left: -18px; top: 18px;
      width: 14px; border-top: 1px solid var(--tree-guide);
    }
    /* Last-child elbow: extend a short tail of the vertical guide down to
       the row centre so the connector reads as └─ instead of ├─. */
    .org-children > .org-node:last-child > .org-row::after {
      content: ""; position: absolute; left: -19px; top: 0;
      height: 18px; width: 1px; background: var(--tree-guide);
    }

    .org-orcid { font-family: var(--mono); font-size: 10px; color: var(--fg-dim); }
    .org-orcid.none { opacity: 0.45; }
    .org-err { color: var(--danger, #d66); font-size: 11px; font-family: var(--mono); }
  </style>
</head>
<body class="shell-fixed">
  <div id="tenant-root"></div>
  <script type="module" src="/tenant.tsx"></script>
</body>
</html>
