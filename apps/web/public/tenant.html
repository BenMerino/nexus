<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Research — Nexus</title>
  <link rel="stylesheet" href="/shared.css">
  <style>
    /* Chrome (floating glass header + shell) is the SHARED app-chrome.css
       (imported via shared.css) — see N9. Page-specific styles only below. */

    /* ── Page head: serif headline + lede ───────────────────────────── */
    .page-title { font-family: var(--display); font-size: 40px; line-height: 1.02; letter-spacing: -0.01em; font-weight: 400; max-width: 18ch; margin: 0; }
    .page-title em { font-style: italic; color: var(--fg-muted); }
    .page-lede { color: var(--fg-muted); font-size: 14.5px; max-width: 46ch; margin-top: 10px; line-height: 1.55; }

    /* ── Omnibox: input + grouped results popover (page-head, left) ──── */
    .omni { position: relative; flex: 1 1 280px; max-width: 520px; min-width: 0; }
    .omni-input {
      width: 100%; padding: 10px 14px; font-size: 13px; color: var(--fg);
      background: var(--bg-card); border: 1px solid var(--border); box-shadow: var(--shadow-sm);
    }
    .omni-input::placeholder { color: var(--fg-dim); }
    .omni-input:focus { outline: none; border-color: var(--accent); }
    .omni-pop {
      position: absolute; top: calc(100% + 6px); left: 0; right: 0; z-index: 40;
      background: var(--bg-card); border: 1px solid var(--border); box-shadow: var(--shadow-sm);
      max-height: 420px; overflow-y: auto;
    }
    .omni-group { font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-dim); padding: 10px 13px 4px; }
    .omni-row {
      display: flex; align-items: baseline; gap: 10px; width: 100%; text-align: left;
      padding: 7px 13px; border: none; background: none; cursor: pointer;
      color: var(--fg); text-decoration: none; font-size: 13px; font-family: inherit;
    }
    .omni-row:hover { background: var(--bg-inset); }
    .omni-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .omni-sub { font-family: var(--mono); font-size: 10.5px; color: var(--fg-dim); flex: none; }
    .omni-empty { padding: 12px 13px; font-family: var(--mono); font-size: 12px; color: var(--fg-dim); }

    /* ── KPI cards: accent rail + mono label + serif value + sparkline ── */
    .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--chrome-inset); margin-bottom: var(--chrome-inset); }
    /* Impact indices (h-index / i10): two cards, each spanning half the row. */
    .kpi-grid.impact > .kpi { grid-column: span 2; }
    @media (max-width: 980px) { .kpi-grid { grid-template-columns: 1fr 1fr; } .kpi-grid.impact > .kpi { grid-column: span 1; } }
    @media (max-width: 560px) { .kpi-grid { grid-template-columns: 1fr; } }
    .kpi {
      position: relative; background: var(--bg-card); border: 1px solid var(--border);
      padding: 22px 22px 20px; display: flex; flex-direction: column; gap: 16px;
      min-height: 152px; overflow: hidden; box-shadow: var(--shadow-sm);
      border-radius: var(--radius-card);
    }
    .kpi-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .kpi-label { font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.13em; color: var(--fg-dim); }
    .kpi-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--kpi-accent, var(--j-sapphire)); }
    .kpi-body { display: flex; align-items: flex-end; justify-content: space-between; gap: 14px; margin-top: auto; }
    .kpi-val { font-family: var(--display); font-size: 44px; line-height: 0.92; letter-spacing: -0.012em; font-weight: 400; font-variant-numeric: tabular-nums; }
    .kpi-val .pct { font-size: 28px; color: var(--fg-muted); }
    .kpi-spark { display: block; flex: none; }
    /* Series sparkline as a full-bleed bottom strip: negative margins cancel
       the card padding so the area gradient runs edge-to-edge; the SVG inside
       is drawn at the strip's measured width (no stretch distortion). */
    .kpi-spark-strip { margin: 0 -22px -20px; height: 44px; overflow: hidden; }
    .kpi-spark-strip .kpi-spark { width: 100%; height: 100%; }
    .kpi-foot { font-family: var(--mono); font-size: 10.5px; color: var(--fg-dim); letter-spacing: 0.04em; }

    /* ── Chart panels: card chrome wrapping the engine charts ────────── */
    .panel { background: var(--bg-card); border: 1px solid var(--border); padding: 22px 24px 24px; box-shadow: var(--shadow-sm); min-width: 0;
      border-radius: var(--radius-card);
      /* Skip layout/paint for panels below the fold until they scroll near;
         the intrinsic-size estimate keeps the scrollbar from jumping. */
      content-visibility: auto; contain-intrinsic-size: auto 420px; }
    .panel-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 18px; }
    .panel-title { font-family: var(--display); font-size: 22px; font-weight: 400; line-height: 1.05; letter-spacing: -0.005em; margin: 0; }
    .panel-sub { font-family: var(--mono); font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.13em; color: var(--fg-dim); margin-top: 7px; }
    .panel-tag { font-family: var(--mono); font-size: 10px; color: var(--fg-dim); border: 1px solid var(--border); padding: 3px 8px; letter-spacing: 0.06em; white-space: nowrap; flex: none; }
    /* 2-col chart grid: .tall spans two rows (contributors hero), .full both cols. */
    .chart-grid { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: var(--chrome-inset); min-width: 0; align-items: start; }
    .chart-grid .tall { grid-row: span 2; }
    .chart-grid .full { grid-column: 1 / -1; }
    @media (max-width: 760px) { .chart-grid { grid-template-columns: 1fr; } .chart-grid .tall { grid-row: auto; } }
    /* Two-column shell: org scheme pinned left, Overview/Authors content right.
       The rail is a sticky, independently-scrolling sidebar; the content takes
       the remaining width. */
    /* Left-anchored (no centering gutter) so the rail hugs the page edge; the
       page's own 24px padding is the only space before the schema. */
    .tenant-layout { display: grid; grid-template-columns: 264px minmax(0, 1fr); gap: var(--chrome-inset); align-items: start; }
    .tenant-rail {
      position: sticky; top: 0; min-width: 0;
      background: var(--bg-card); border: 1px solid var(--border); box-shadow: var(--shadow-sm);
      border-radius: var(--radius-card);
    }
    /* ── IA section sidebar: 6 groups, each with its leaves ───────────── */
    .tenant-sidebar { display: flex; flex-direction: column; gap: 4px; padding: 10px; max-height: calc(100vh - 160px); overflow-y: auto; }
    .nav-section { padding: 6px 0; }
    .nav-section + .nav-section { border-top: 1px solid var(--border-soft); margin-top: 2px; }
    .nav-section-title {
      font-family: var(--mono); font-weight: 400; font-size: 10px;
      text-transform: uppercase; letter-spacing: 0.12em; color: var(--fg-dim);
      margin: 4px 10px 6px;
    }
    .nav-section.soon .nav-section-title { opacity: 0.7; }
    .nav-section-leaves { display: flex; flex-direction: column; gap: 1px; }
    .nav-leaf {
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
      padding: 7px 11px; cursor: pointer; border: 1px solid transparent;
      border-radius: var(--radius-sm, 6px); position: relative; transition: background 0.12s;
    }
    .nav-leaf:hover { background: var(--bg-inset); }
    .nav-leaf.active { background: var(--bg-inset); border-color: var(--border-soft); }
    .nav-leaf.active::before { content: ""; position: absolute; left: 0; top: 6px; bottom: 6px; width: 2px; background: var(--primary); border-radius: 2px; }
    .nav-leaf-label { font-size: 13px; color: var(--fg); line-height: 1.25; }
    .nav-leaf.active .nav-leaf-label { font-weight: 500; }
    .nav-leaf.soon { cursor: default; }
    .nav-leaf.soon:hover { background: transparent; }
    .nav-leaf.soon .nav-leaf-label { color: var(--fg-dim); }
    .nav-leaf-tag {
      font-family: var(--mono); font-size: 8.5px; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--fg-dim); background: var(--bg-inset); padding: 2px 6px; border-radius: 999px; white-space: nowrap;
    }

    /* ── In-view unit scope dropdown (replaces the rail as the scope picker) ── */
    .tenant-content-bar { display: flex; justify-content: flex-end; margin-bottom: 14px; }
    .unit-filter { display: inline-flex; align-items: center; gap: 8px; }
    .unit-filter-label { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--fg-dim); }
    .unit-filter-select {
      font-family: var(--mono); font-size: 12px; color: var(--fg);
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm, 6px);
      padding: 6px 28px 6px 10px; cursor: pointer; max-width: 280px;
    }
    .unit-filter-select:disabled { opacity: 0.5; cursor: default; }

    /* ── Section placeholder (all-soon section content) ──────────────── */
    .section-placeholder { padding: 28px 14px; color: var(--fg-dim); font-family: var(--mono); font-size: 13px; text-align: center; }

    .tenant-content { flex: 1 1 auto; min-width: 0; padding: 0; max-width: none; margin: 0; }
    @media (max-width: 980px) {
      /* Stack on narrow screens: section sidebar above the content, full width. */
      .tenant-layout { grid-template-columns: 1fr; gap: var(--chrome-inset); }
      .tenant-rail { position: static; }
      .tenant-sidebar { max-height: none; }
    }
    /* ── Publication list rows (most cited / recent panels) ──────────── */
    .work-item { padding: 10px 0; border-bottom: 1px solid var(--border-soft); }
    .work-item:last-child { border-bottom: none; }
    .work-title { font-size: 13.5px; line-height: 1.4; }
    .work-title a { color: var(--fg); }
    .work-title a:hover { color: var(--accent); }
    .work-meta { display: flex; flex-wrap: wrap; gap: 4px 14px; margin-top: 4px; font-family: var(--mono); font-size: 10.5px; color: var(--fg-dim); align-items: baseline; }
    .work-journal { font-style: italic; font-family: var(--serif, serif); font-size: 12px; color: var(--fg-muted); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%; }
    .work-cites { margin-left: auto; flex: none; }
    .work-empty { color: var(--fg-dim); font-family: var(--mono); font-size: 12px; padding: 12px 0; }

    /* ── Provenance footer ────────────────────────────────────────────── */
    .public-foot {
      max-width: var(--maxw); margin: 48px auto 0; padding-top: 18px;
      border-top: 1px solid var(--border-soft);
      font-family: var(--mono); font-size: 10.5px; color: var(--fg-dim);
      line-height: 1.8; letter-spacing: 0.04em;
    }

    /* Roster-style table: bordered, full-width, sticky header, hover rows. */
    .admin-table { width: 100%; border-collapse: collapse; font-size: 12px; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .admin-table th, .admin-table td { padding: 9px 12px; text-align: left; border-bottom: 1px solid var(--border-soft); }
    .admin-table th { position: sticky; top: 0; z-index: 1; background: var(--bg-inset); font-weight: 500; text-transform: uppercase; font-size: 10px; letter-spacing: 0.12em; color: var(--fg-dim); font-family: var(--mono); user-select: none; }
    .admin-table tbody tr:last-child td { border-bottom: none; }
    .admin-table tbody tr:hover { background: var(--bg-inset); }
    .roster-toolbar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .tableScroll { max-height: 56vh; overflow: auto; }
    /* Org tree — file-explorer style with CSS-drawn connector lines.
       Each subtree carries a vertical guide on the left; each direct
       child grows a horizontal hook into its row's vertical center. */
    .org-tree { font-size: 13px; --tree-guide: var(--border); }
    .org-node { position: relative; }
    .org-node > .org-row { display: flex; align-items: center; gap: 10px; padding: 9px 4px; cursor: pointer; position: relative; }
    .org-node > .org-row:hover { background: var(--bg-inset); }
    .org-node > .org-row.leaf { cursor: default; }
    /* Selectable scope rows: clicking re-scopes the Overview. Active row gets a
       left accent + tint so the current scope is unmistakable. */
    .org-row.selectable { border-radius: var(--radius-control); }
    .org-row.active { background: var(--bg-inset); box-shadow: inset 2px 0 0 var(--primary); }
    .org-row.active .org-name { color: var(--primary); }
    .org-twist { width: 12px; color: var(--fg-dim); font-size: 10px; flex: none; transition: transform 0.12s; text-align: center; }
    .org-twist.open { transform: rotate(90deg); }
    .org-name { flex: 1; }
    .org-name.fac { font-family: var(--display); font-size: 15px; }
    /* Kind tag in its own fixed-width slot so every tag aligns into one column,
       regardless of the unit name's length (department rows leave it empty). */
    .org-kind-slot { flex: none; width: 76px; display: flex; justify-content: flex-start; }
    .org-kind { font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg-dim); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 1px 5px; white-space: nowrap; }
    .org-name.dep { color: var(--fg); }
    .org-name.person { color: var(--fg-dim); font-size: 12px; }
    .org-metrics { display: flex; gap: 6px; align-items: center; flex: none; }
    .org-pill { font-family: var(--mono); font-size: 10px; letter-spacing: 0.04em; padding: 2px 7px; border-radius: var(--radius-pill); background: var(--bg-inset); border: 1px solid var(--border); color: var(--fg-dim); white-space: nowrap; }
    .org-pill.cov-full { border-color: var(--accent); color: var(--accent); }

    /* Ranked metric bar on each unit row — the scheme as a contributors chart.
       Fixed-width on the right so bars align into a column down the rail. */
    .org-bar { display: flex; align-items: center; gap: 8px; flex: none; width: 132px; }
    .org-bar-track { flex: 1; height: 7px; background: var(--bg-inset); border-radius: var(--radius-sm); overflow: hidden; }
    .org-bar-fill { display: block; height: 100%; background: var(--chart-1); border-radius: var(--radius-sm); }
    .org-bar-val { font-family: var(--mono); font-size: 11px; color: var(--fg-dim); min-width: 40px; text-align: right; white-space: nowrap; }
    /* Departments' bars a touch dimmer so faculty bars read as the primary tier. */
    .org-children .org-bar-fill { background: var(--chart-2); }

    /* Biggest-contributors ranking rows (right-side chart). Name takes the slack
       so every bar aligns into a column; drillable rows highlight on hover. */
    .contrib-row { display: flex; align-items: center; gap: 12px; padding: 5px 6px; border-radius: var(--radius-control); }
    .contrib-row.drillable { cursor: pointer; }
    .contrib-row.drillable:hover { background: var(--bg-inset); }
    .contrib-name { flex: 1; min-width: 0; font-size: 13px; color: var(--fg); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .contrib-row .org-bar { width: 180px; }

    /* Top-level faculties: light card stripe so they read as roots. */
    .org-tree > .org-node { border-top: 1px solid var(--border-soft); }
    .org-tree > .org-node:first-child { border-top: none; }
    .org-tree > .org-node > .org-row { padding: 12px 4px; }

    /* Sub-tree container with vertical guide on the left. */
    .org-children { display: none; position: relative; margin-left: 11px; padding-left: 18px; }
    .org-children.open { display: block; }
    .org-children::before {
      content: ""; position: absolute; left: 0; top: 0;
      bottom: 18px; /* stop near the last child's row centre so the guide ends at └─ */
      border-left: 1px solid var(--tree-guide);
    }
    /* Horizontal hook from the vertical guide into each direct child row. */
    .org-children > .org-node > .org-row::before {
      content: ""; position: absolute; left: -18px; top: 18px;
      width: 14px; border-top: 1px solid var(--tree-guide);
    }
    /* Last-child elbow: extend a short tail of the vertical guide down to
       the row centre so the connector reads as └─ instead of ├─. */
    .org-children > .org-node:last-child > .org-row::after {
      content: ""; position: absolute; left: -19px; top: 0;
      height: 18px; width: 1px; background: var(--tree-guide);
    }

    .org-orcid { font-family: var(--mono); font-size: 10px; color: var(--fg-dim); }
    .org-orcid.none { opacity: 0.45; }
    .org-err { color: var(--danger, #d66); font-size: 11px; font-family: var(--mono); }
  </style>
</head>
<body class="shell-fixed">
  <div id="tenant-root"></div>
  <script type="module" src="/tenant.tsx"></script>
</body>
</html>
