<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Academic profile — Nexus</title>
  <link rel="stylesheet" href="/shared.css">
  <style>
    /* Public academic-profile shell. Header chrome mirrors tenant.html so the
       profile reads as the same site (same frosted bar, crest, theme toggle). */
    .public-app { --maxw: 1100px; display: flex; flex-direction: column; height: 100vh; }
    .public-header {
      display: flex; justify-content: center;
      padding: 0 28px; min-height: 60px;
      background: color-mix(in oklch, var(--bg) 86%, transparent);
      backdrop-filter: blur(14px) saturate(1.4);
      border-bottom: 1px solid var(--border-soft);
      flex: none; z-index: 30;
    }
    .public-header-inner {
      display: flex; align-items: center; gap: 24px; flex-wrap: wrap;
      width: 100%; max-width: var(--maxw);
    }
    .public-brand { display: flex; align-items: center; gap: 13px; flex: none; }
    .public-logo { height: 36px; width: auto; max-width: 120px; object-fit: contain; }
    .public-logo-fallback {
      position: relative; display: grid; place-items: center;
      height: 38px; width: 38px; flex: none; overflow: hidden;
      border: 1px solid var(--border); background: var(--bg-card);
    }
    .public-logo-fallback::before {
      content: ""; position: absolute; inset: 0; opacity: 0.92;
      background: linear-gradient(135deg, var(--j-sapphire) 0%, var(--j-amethyst) 100%);
    }
    .public-logo-fallback::after {
      content: attr(data-initial); position: relative;
      font-family: var(--display); font-size: 22px; color: #fff; line-height: 1;
    }
    .public-tenant-name { font-family: var(--display); font-size: 20px; line-height: 1.05; letter-spacing: 0.005em; }
    .public-tenant-sub { font-family: var(--mono); font-size: 10px; letter-spacing: 0.13em; text-transform: uppercase; color: var(--fg-dim); margin-top: 3px; }
    .public-tenant-sub a { color: var(--fg-dim); }
    .public-tenant-sub a:hover { color: var(--accent); }
    .public-tabs { display: flex; gap: 4px; flex: 1; align-self: stretch; align-items: center; margin-left: 8px; }
    .public-header-aux {
      display: flex; align-items: center; gap: 14px;
      font-family: var(--mono); font-size: 11px; color: var(--fg-dim); flex: none;
    }
    .public-updated { display: flex; align-items: center; gap: 7px; letter-spacing: 0.04em; }
    .sync-pulse {
      width: 6px; height: 6px; border-radius: 50%; background: var(--j-emerald);
      animation: sync-pulse 2.4s ease infinite; flex: none;
    }
    @keyframes sync-pulse {
      0%   { box-shadow: 0 0 0 0 color-mix(in oklch, var(--j-emerald) 60%, transparent); }
      70%  { box-shadow: 0 0 0 6px transparent; }
      100% { box-shadow: 0 0 0 0 transparent; }
    }
    .theme-btn {
      width: 34px; height: 34px; flex: none; cursor: pointer;
      display: grid; place-items: center;
      border: 1px solid var(--border); background: var(--bg-card); color: var(--fg-muted);
      transition: color 0.15s, border-color 0.15s;
    }
    .theme-btn:hover { color: var(--fg); border-color: var(--fg-dim); }
    .theme-btn svg { width: 16px; height: 16px; }
    .theme-btn .icon-moon { display: block; }
    .theme-btn .icon-sun { display: none; }
    :root[data-theme="dark"] .theme-btn .icon-moon { display: none; }
    :root[data-theme="dark"] .theme-btn .icon-sun { display: block; }
    .public-signin { color: var(--fg-dim); }
    .public-signin:hover { color: var(--accent); }
    .public-main { flex: 1; padding: 32px 28px 72px; overflow-y: auto; min-height: 0; }
    .public-content { max-width: var(--maxw); margin: 0 auto; }

    /* ── Breadcrumb back to the institution page ───────────────────── */
    .profile-back {
      display: inline-block; margin-bottom: 18px;
      font-family: var(--mono); font-size: 11px; letter-spacing: 0.06em;
      color: var(--fg-dim); text-decoration: none;
    }
    .profile-back:hover { color: var(--accent); }

    /* ── Identity hero: avatar + name + placement + stat strip ─────── */
    .profile-hero {
      background: var(--bg-card); border: 1px solid var(--border);
      box-shadow: var(--shadow-sm); padding: 28px 30px; margin-bottom: 24px;
    }
    .profile-head { display: flex; gap: 22px; align-items: flex-start; flex-wrap: wrap; }
    .profile-avatar {
      position: relative; display: grid; place-items: center;
      height: 84px; width: 84px; flex: none; overflow: hidden;
      border: 1px solid var(--border);
    }
    .profile-avatar::before {
      content: ""; position: absolute; inset: 0; opacity: 0.92;
      background: linear-gradient(135deg, var(--j-sapphire) 0%, var(--j-amethyst) 100%);
    }
    .profile-avatar span { position: relative; font-family: var(--display); font-size: 34px; color: #fff; line-height: 1; }
    .profile-id { flex: 1; min-width: 240px; }
    .profile-eyebrow { font-family: var(--mono); font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.13em; color: var(--fg-dim); margin-bottom: 6px; }
    .profile-name { font-family: var(--display); font-size: 34px; line-height: 1.05; letter-spacing: -0.01em; font-weight: 400; margin: 0; }
    .profile-unit { margin-top: 8px; font-size: 13px; color: var(--fg-muted); line-height: 1.5; }
    .profile-unit b { color: var(--fg); font-weight: 500; }
    .profile-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; align-items: center; }
    .profile-chip {
      font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
      border: 1px solid var(--border); padding: 3px 9px; color: var(--fg-dim); white-space: nowrap;
    }
    .profile-chip.orcid { color: var(--accent); border-color: color-mix(in oklch, var(--accent) 45%, var(--border)); text-decoration: none; }
    .profile-chip.orcid:hover { color: var(--fg); border-color: var(--accent); }
    .profile-stats {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 14px; margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border-soft);
    }
    .profile-stat span { display: block; font-family: var(--display); font-size: 34px; line-height: 0.95; font-variant-numeric: tabular-nums; }
    .profile-stat label { display: block; margin-top: 7px; font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--fg-dim); }

    /* ── Body grid: publications (main) + output-per-year aside ────── */
    .profile-grid { display: grid; grid-template-columns: minmax(0, 1fr) 300px; gap: 24px; align-items: start; }
    /* Single column on narrow screens — the output-per-year aside comes FIRST
       so the shape-of-career summary isn't buried under a long paper list. */
    @media (max-width: 860px) {
      .profile-grid { grid-template-columns: 1fr; }
      .profile-aside { order: -1; }
    }
    .profile-panel { background: var(--bg-card); border: 1px solid var(--border); box-shadow: var(--shadow-sm); padding: 22px 24px 24px; min-width: 0; }
    .profile-panel-title { font-family: var(--display); font-size: 20px; font-weight: 400; margin: 0 0 16px; }

    /* Output-per-year bars (token-colored, no chart engine needed). */
    .yearbar { display: grid; grid-template-columns: 42px 1fr 36px; gap: 10px; align-items: center; padding: 4px 0; }
    .yearbar.clickable { cursor: pointer; }
    .yearbar.clickable:hover .y { color: var(--accent); }
    .yearbar.clickable:hover .t i { opacity: 1; }
    .yearbar .y { font-family: var(--mono); font-size: 11px; color: var(--fg-dim); }
    .yearbar .t { height: 8px; background: var(--bg-inset); overflow: hidden; }
    .yearbar .t i { display: block; height: 100%; background: var(--primary, var(--j-sapphire)); opacity: 0.8; }
    .yearbar .n { font-family: var(--mono); font-size: 11px; color: var(--fg-muted); text-align: right; }

    /* Publications grouped by year. */
    .pub-year { margin-bottom: 18px; }
    .pub-year-label {
      font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; color: var(--fg-dim);
      padding-bottom: 6px; border-bottom: 1px solid var(--border-soft); margin-bottom: 4px;
      display: flex; justify-content: space-between;
    }
    .pub-year-label.clickable { cursor: pointer; user-select: none; }
    .pub-year-label.clickable:hover { color: var(--fg); }
    .pub-twist { display: inline-block; font-style: normal; font-size: 9px; width: 10px; transition: transform 0.12s; }
    .pub-twist.open { transform: rotate(90deg); }

    /* Loading skeleton (hero placeholder while the profile fetch is in flight). */
    .profile-skel .skel-block::before { background: var(--bg-inset); }
    .skel-line { height: 13px; background: var(--bg-inset); animation: skel-pulse 1.4s ease infinite; }
    .profile-skel .profile-avatar { border-color: var(--border-soft); }
    .profile-skel .profile-avatar::before { background: var(--bg-inset); animation: skel-pulse 1.4s ease infinite; }
    @keyframes skel-pulse { 0%, 100% { opacity: 0.55; } 50% { opacity: 1; } }
    .pub-item { padding: 10px 2px; border-bottom: 1px solid var(--border-soft); }
    .pub-item:last-child { border-bottom: none; }
    .pub-title { font-size: 13.5px; line-height: 1.4; color: var(--fg); }
    .pub-meta { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 5px; font-family: var(--mono); font-size: 10.5px; color: var(--fg-dim); align-items: center; }
    .pub-meta a { color: var(--fg-dim); }
    .pub-meta a:hover { color: var(--accent); }
    .pub-journal { font-style: italic; font-family: var(--serif, inherit); }
    .pub-cites { white-space: nowrap; }

    @media (max-width: 700px) {
      .public-header { padding: 8px 14px; gap: 12px; }
      .public-header-aux { display: none; }
      .profile-hero { padding: 20px; }
    }
  </style>
</head>
<body class="shell-fixed">
  <div id="author-root"></div>
  <script type="module" src="/author.tsx"></script>
</body>
</html>
