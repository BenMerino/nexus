<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Academic profile — Nexus</title>
  <link rel="stylesheet" href="/shared.css">
  <style>
    /* Chrome (floating glass header + shell) is the SHARED app-chrome.css
       (imported via shared.css) — see N9. Page-specific styles only below. */

    /* ── Breadcrumb back to the institution page ───────────────────── */
    .profile-back {
      display: inline-block; margin-bottom: 18px;
      font-family: var(--font-mono); font-size: var(--text-micro); letter-spacing: 0.06em;
      color: var(--fg-dim); text-decoration: none;
    }
    .profile-back:hover { color: var(--accent); }

    /* ── Identity hero: avatar + name + placement + stat strip ─────── */
    .profile-hero {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-sm); padding: 28px 30px; margin-bottom: 24px;
    }
    .profile-head { display: flex; gap: 22px; align-items: flex-start; flex-wrap: wrap; }
    .profile-avatar {
      position: relative; display: grid; place-items: center;
      height: 84px; width: 84px; flex: none; overflow: hidden;
      border: 1px solid var(--border);
    }
    .profile-avatar::before {
      content: ""; position: absolute; inset: 0; opacity: 0.92;
      background: linear-gradient(135deg, var(--j-sapphire) 0%, var(--j-amethyst) 100%);
    }
    .profile-avatar span { position: relative; font-family: var(--font-display); font-size: var(--text-display); color: #fff; line-height: 1; }
    .profile-id { flex: 1; min-width: 240px; }
    .profile-eyebrow { font-family: var(--font-mono); font-size: var(--text-micro); text-transform: uppercase; letter-spacing: var(--tracking-label); color: var(--fg-dim); margin-bottom: 6px; }
    .profile-name { font-family: var(--font-display); font-size: var(--text-display); line-height: 1.05; letter-spacing: var(--tracking-h); font-weight: var(--weight-body); margin: 0; }
    .profile-unit { margin-top: 8px; font-size: var(--text-detail); color: var(--fg-muted); line-height: 1.5; }
    .profile-unit b { color: var(--fg); font-weight: var(--weight-label); }
    .profile-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; align-items: center; }
    .profile-chip {
      font-family: var(--font-mono); font-size: var(--text-micro); letter-spacing: 0.08em; text-transform: uppercase;
      border: 1px solid var(--border); padding: 3px 9px; color: var(--fg-dim); white-space: nowrap;
    }
    .profile-chip.orcid { color: var(--accent); border-color: color-mix(in oklch, var(--accent) 45%, var(--border)); text-decoration: none; }
    .profile-chip.orcid:hover { color: var(--fg); border-color: var(--accent); }
    .profile-stats {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 14px; margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border-soft);
    }
    .profile-stat span { display: block; font-family: var(--font-display); font-size: var(--text-display); line-height: 0.95; font-variant-numeric: tabular-nums; }
    .profile-stat label { display: block; margin-top: 7px; font-family: var(--font-mono); font-size: var(--text-micro); text-transform: uppercase; letter-spacing: var(--tracking-label); color: var(--fg-dim); }

    /* ── Body grid: publications (main) + output-per-year aside ────── */
    .profile-grid { display: grid; grid-template-columns: minmax(0, 1fr) 300px; gap: 24px; align-items: start; }
    /* Single column on narrow screens — the output-per-year aside comes FIRST
       so the shape-of-career summary isn't buried under a long paper list. */
    @media (max-width: 860px) {
      .profile-grid { grid-template-columns: 1fr; }
      .profile-aside { order: -1; }
    }
    .profile-panel { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-card); box-shadow: var(--shadow-sm); padding: 22px 24px 24px; min-width: 0; }
    .profile-panel-title { font-family: var(--font-display); font-size: var(--text-h3); font-weight: var(--weight-body); margin: 0 0 16px; }

    /* Output-per-year bars (token-colored, no chart engine needed). */
    .yearbar { display: grid; grid-template-columns: 42px 1fr 36px; gap: 10px; align-items: center; padding: 4px 0; }
    .yearbar.clickable { cursor: pointer; }
    .yearbar.clickable:hover .y { color: var(--accent); }
    .yearbar.clickable:hover .t i { opacity: 1; }
    .yearbar .y { font-family: var(--font-mono); font-size: var(--text-micro); color: var(--fg-dim); }
    .yearbar .t { height: 8px; background: var(--bg-inset); overflow: hidden; }
    .yearbar .t i { display: block; height: 100%; background: var(--primary, var(--j-sapphire)); opacity: 0.8; }
    .yearbar .n { font-family: var(--font-mono); font-size: var(--text-micro); color: var(--fg-muted); text-align: right; }

    /* Publications grouped by year. */
    .pub-year { margin-bottom: 18px; }
    .pub-year-label {
      font-family: var(--font-mono); font-size: var(--text-micro); letter-spacing: var(--tracking-label); color: var(--fg-dim);
      padding-bottom: 6px; border-bottom: 1px solid var(--border-soft); margin-bottom: 4px;
      display: flex; justify-content: space-between;
    }
    .pub-year-label.clickable { cursor: pointer; user-select: none; }
    .pub-year-label.clickable:hover { color: var(--fg); }
    .pub-twist { display: inline-block; font-style: normal; font-size: var(--text-micro); width: 10px; transition: transform 0.12s; }
    .pub-twist.open { transform: rotate(90deg); }

    /* Loading skeleton (hero placeholder while the profile fetch is in flight). */
    .profile-skel .skel-block::before { background: var(--bg-inset); }
    .skel-line { height: 13px; background: var(--bg-inset); animation: skel-pulse 1.4s ease infinite; }
    .profile-skel .profile-avatar { border-color: var(--border-soft); }
    .profile-skel .profile-avatar::before { background: var(--bg-inset); animation: skel-pulse 1.4s ease infinite; }
    @keyframes skel-pulse { 0%, 100% { opacity: 0.55; } 50% { opacity: 1; } }
    .pub-item { padding: 10px 2px; border-bottom: 1px solid var(--border-soft); }
    .pub-item:last-child { border-bottom: none; }
    .pub-title { font-size: var(--text-body); line-height: 1.4; color: var(--fg); }
    .pub-meta { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 5px; font-family: var(--font-mono); font-size: var(--text-micro); color: var(--fg-dim); align-items: center; }
    .pub-meta a { color: var(--fg-dim); }
    .pub-meta a:hover { color: var(--accent); }
    .pub-journal { font-style: italic; font-family: var(--serif, inherit); }
    .pub-cites { white-space: nowrap; }
    /* Full author list under each paper — roster members are links. */
    .pub-authors { margin-top: 3px; font-size: var(--text-micro); color: var(--fg-muted); line-height: 1.5; }
    .pub-authors a { color: var(--fg-muted); text-decoration: underline; text-decoration-color: var(--border); }
    .pub-authors a:hover { color: var(--accent); }
    .pub-authors-more { color: var(--fg-dim); font-family: var(--font-mono); font-size: var(--text-micro); }

    /* "Most cited" aside strip above the per-year bars. */
    .topcited { margin-bottom: 22px; }
    .topcited-row { display: flex; gap: 10px; align-items: baseline; padding: 6px 0; border-bottom: 1px solid var(--border-soft); }
    .topcited-row:last-child { border-bottom: none; }
    .topcited-title { flex: 1; min-width: 0; font-size: var(--text-detail); line-height: 1.35; }
    .topcited-title a { color: var(--fg); }
    .topcited-title a:hover { color: var(--accent); }
    .topcited-cites { font-family: var(--font-mono); font-size: var(--text-micro); color: var(--fg-dim); flex: none; }

    @media (max-width: 700px) {
      .profile-hero { padding: 20px; }
    }
  </style>
</head>
<body class="shell-fixed">
  <div id="author-root"></div>
  <script type="module" src="/author.tsx"></script>
</body>
</html>
